name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  discover:
    name: Discover MCPs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - id: set
        run: |
          matrix="$(node scripts/discover-mcps.ts)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  release:
    name: Release (${{ matrix.mcp }})
    needs: discover
    runs-on: ubuntu-latest
    # Each image is an independent semver lineage; never abort siblings on one failure.
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: semantic-release ${{ matrix.mcp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MCP_NAME: ${{ matrix.mcp }}
        run: npx semantic-release
