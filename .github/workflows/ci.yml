name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  discover:
    name: Discover MCPs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - id: set
        run: echo "matrix=$(node scripts/discover-mcps.ts)" >> "$GITHUB_OUTPUT"

  integration:
    name: Integration (${{ matrix.mcp }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build and test ${{ matrix.mcp }}
        env:
          MCP_NAME: ${{ matrix.mcp }}
        run: npm run test:integration

  # Stable aggregate gate for branch protection: the dynamic matrix produces
  # per-MCP check names, so require this fixed name instead. always() forces it
  # to run even when a dependency fails (a skipped required check reads as green).
  ci-passed:
    name: CI passed
    if: always()
    needs: [unit, discover, integration]
    runs-on: ubuntu-latest
    steps:
      - if: >-
          ${{ contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped') }}
        run: exit 1
